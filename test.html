<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mockup Alta Fedeltà</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html,
        body {
            height: 100%;
            overflow: hidden;
            background-color: #f9fafb;
        }

        #app {
            height: 100dvh;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        #app::-webkit-scrollbar {
            display: none;
        }

        .safe-pb {
            padding-bottom: 100px;
        }
    </style>
</head>

<body class="text-gray-900 font-sans antialiased selection:bg-blue-200">
    <div id="app" class="max-w-md mx-auto min-h-screen relative">

        <header class="pt-12 pb-2 px-6 sticky top-0 z-10 bg-[#f9fafb]/90 backdrop-blur-md">
            <h1 class="text-[28px] font-black text-gray-900 tracking-tight">Ciao Andrea! 👋</h1>
            <p class="text-sm font-medium text-gray-400 mt-0.5">Venerdì, 5 Giugno</p>
        </header>

        <main class="p-5 space-y-5 safe-pb">

            <div class="grid grid-cols-2 gap-4">
                <div
                    class="bg-white p-5 rounded-[24px] border border-gray-100 shadow-[0_8px_30px_rgb(0,0,0,0.04)] flex flex-col items-center text-center">
                    <span class="font-bold text-gray-800 text-sm mb-3 flex items-center gap-1">
                        Fiamma <span class="text-lg">🔥</span>
                    </span>
                    <div class="text-[40px] mb-2 drop-shadow-md">🔥</div>
                    <p class="text-sm font-bold text-gray-900">12 Giorni Attivi</p>
                    <p class="text-[11px] font-medium text-gray-400 mt-1">Record: 28 gg</p>
                </div>

                <div
                    class="bg-white p-5 rounded-[24px] border border-gray-100 shadow-[0_8px_30px_rgb(0,0,0,0.04)] flex flex-col items-center text-center">
                    <span class="font-bold text-gray-800 text-sm mb-3 flex items-center gap-1">
                        Calorie <span class="text-yellow-400 text-lg">⚡</span>
                    </span>
                    <div
                        class="w-14 h-14 rounded-full border-[4px] border-gray-100 border-t-gray-800 flex items-center justify-center mb-2">
                        <svg class="w-5 h-5 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                        </svg>
                    </div>
                    <p class="text-sm font-bold text-gray-900">1.450 <span class="text-xs font-normal text-gray-500">/
                            2.500</span></p>
                    <p class="text-[11px] font-medium text-gray-400 mt-1">1.050 rimaste</p>
                </div>
            </div>

            <div class="bg-white p-6 rounded-[24px] border border-gray-100 shadow-[0_8px_30px_rgb(0,0,0,0.04)]">
                <div class="flex justify-between items-center mb-4">
                    <span class="font-bold text-gray-800 flex items-center gap-1.5 text-sm">
                        Idratazione <svg class="w-4 h-4 text-blue-400" fill="currentColor" viewBox="0 0 24 24">
                            <path
                                d="M12 2c-5.33 5.58-8 9.24-8 12.83A8.04 8.04 0 0012 22a8.04 8.04 0 008-7.17C20 11.24 17.33 7.58 12 2z" />
                        </svg>
                    </span>
                    <span class="text-[11px] font-bold text-gray-500">1250 ml / 2000 ml</span>
                </div>

                <div class="flex justify-between items-center px-1 mb-4">
                    <svg class="w-7 h-7 text-[#60A5FA]" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M12 2c-5.33 5.58-8 9.24-8 12.83A8.04 8.04 0 0012 22a8.04 8.04 0 008-7.17C20 11.24 17.33 7.58 12 2z" />
                    </svg>
                    <svg class="w-7 h-7 text-[#60A5FA]" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M12 2c-5.33 5.58-8 9.24-8 12.83A8.04 8.04 0 0012 22a8.04 8.04 0 008-7.17C20 11.24 17.33 7.58 12 2z" />
                    </svg>
                    <svg class="w-7 h-7 text-[#60A5FA]" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M12 2c-5.33 5.58-8 9.24-8 12.83A8.04 8.04 0 0012 22a8.04 8.04 0 008-7.17C20 11.24 17.33 7.58 12 2z" />
                    </svg>
                    <svg class="w-7 h-7 text-[#60A5FA]" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M12 2c-5.33 5.58-8 9.24-8 12.83A8.04 8.04 0 0012 22a8.04 8.04 0 008-7.17C20 11.24 17.33 7.58 12 2z" />
                    </svg>
                    <svg class="w-7 h-7 text-[#60A5FA]" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M12 2c-5.33 5.58-8 9.24-8 12.83A8.04 8.04 0 0012 22a8.04 8.04 0 008-7.17C20 11.24 17.33 7.58 12 2z" />
                    </svg>
                    <svg class="w-7 h-7 text-gray-200" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M12 2c-5.33 5.58-8 9.24-8 12.83A8.04 8.04 0 0012 22a8.04 8.04 0 008-7.17C20 11.24 17.33 7.58 12 2z" />
                    </svg>
                    <svg class="w-7 h-7 text-gray-200" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M12 2c-5.33 5.58-8 9.24-8 12.83A8.04 8.04 0 0012 22a8.04 8.04 0 008-7.17C20 11.24 17.33 7.58 12 2z" />
                    </svg>
                    <svg class="w-7 h-7 text-gray-200" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M12 2c-5.33 5.58-8 9.24-8 12.83A8.04 8.04 0 0012 22a8.04 8.04 0 008-7.17C20 11.24 17.33 7.58 12 2z" />
                    </svg>
                </div>

                <div class="flex justify-between px-2">
                    <button
                        class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-4 py-1.5 rounded-lg font-bold text-sm transition-colors">-</button>
                    <button
                        class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-4 py-1.5 rounded-lg font-bold text-sm transition-colors">+</button>
                </div>
            </div>

            <div class="space-y-3 pt-2">
                <h3 class="text-[13px] font-bold text-gray-800 ml-1">Quick Actions</h3>

                <button
                    class="w-full bg-black text-white font-bold text-[15px] py-4 rounded-[18px] shadow-[0_8px_20px_rgb(0,0,0,0.15)] flex justify-center items-center gap-2 transition-transform active:scale-95">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z">
                        </path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    Inizia Allenamento
                </button>

                <button
                    class="w-full bg-[#f3f4f6] text-gray-800 font-bold text-[15px] py-4 rounded-[18px] flex justify-center items-center gap-2 transition-transform active:scale-95">
                    <svg class="w-5 h-5 text-gray-600" fill="currentColor" viewBox="0 0 20 20">
                        <path
                            d="M9.049 2.927c.3-.921 1.603-.921 1.898 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z">
                        </path>
                    </svg>
                    Aggiungi Pasto Rapido
                </button>
            </div>

        </main>
    </div>

    <nav
        class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-gray-200 max-w-md mx-auto z-50 flex justify-around items-center px-2 py-3 pb-8">

        <button class="flex flex-col items-center text-[#4F46E5] w-[70px]">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                <path
                    d="M11.47 3.84a.75.75 0 011.06 0l8.99 9a.75.75 0 11-1.06 1.06l-1.21-1.22V20.5a1.5 1.5 0 01-1.5 1.5h-4.5v-5.25a.75.75 0 00-.75-.75h-1.5a.75.75 0 00-.75.75v5.25h-4.5a1.5 1.5 0 01-1.5-1.5v-7.82l-1.21 1.22a.75.75 0 11-1.06-1.06l8.99-9z">
                </path>
            </svg>
            <span class="text-[10px] font-bold mt-1">Riepilogo</span>
        </button>

        <button class="flex flex-col items-center text-gray-400 hover:text-gray-600 transition-colors w-[70px]">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3">
                </path>
            </svg>
            <span class="text-[10px] font-bold mt-1">Palestra</span>
        </button>

        <button class="flex flex-col items-center text-gray-400 hover:text-gray-600 transition-colors w-[70px]">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"></path>
            </svg>
            <span class="text-[10px] font-bold mt-1">Nutrizione</span>
        </button>

    </nav>
</body>

</html>
