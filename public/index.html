<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gym Tracker PWA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!--<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script> -->
    <script type="text/javascript" src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>

    <link rel="manifest" href="/manifest.json">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tracker">
    <link rel="apple-touch-icon" href="/icon.png">
    <link rel="stylesheet" href="./css/style.css?v=22">
</head>

<body class="bg-gray-50 text-gray-900 font-sans antialiased selection:bg-blue-200">
    <div id="app" class="max-w-md mx-auto bg-gray-50 min-h-screen shadow-2xl relative overflow-x-hidden pb-20">
    </div>

    <nav class="fixed bottom-0 left-0 right-0 z-[9999] w-full max-w-md mx-auto bg-white/95 backdrop-blur-xl border-t border-gray-200"
        style="padding-bottom: env(safe-area-inset-bottom);">

        <div class="flex justify-around items-center h-[55px] px-1">

            <button id="nav-home"
                class="flex flex-col items-center justify-center w-[65px] h-full text-[#4F46E5] transition-colors">
                <svg class="w-5 h-5 mb-0.5" fill="currentColor" viewBox="0 0 24 24">
                    <path
                        d="M11.47 3.84a.75.75 0 011.06 0l8.99 9a.75.75 0 11-1.06 1.06l-1.21-1.22V20.5a1.5 1.5 0 01-1.5 1.5h-4.5v-5.25a.75.75 0 00-.75-.75h-1.5a.75.75 0 00-.75.75v5.25h-4.5a1.5 1.5 0 01-1.5-1.5v-7.82l-1.21 1.22a.75.75 0 11-1.06-1.06l8.99-9z" />
                </svg>
                <span class="text-[9px] font-bold leading-none">Home</span>
            </button>

            <button id="nav-gym"
                class="flex flex-col items-center justify-center w-[65px] h-full text-gray-400 hover:text-gray-600 transition-colors">
                <svg class="w-5 h-5 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3" />
                </svg>
                <span class="text-[9px] font-bold leading-none">Palestra</span>
            </button>

            <button id="nav-nutri"
                class="flex flex-col items-center justify-center w-[65px] h-full text-gray-400 hover:text-gray-600 transition-colors">
                <svg class="w-5 h-5 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
                </svg>
                <span class="text-[9px] font-bold leading-none">Nutrizione</span>
            </button>

            <button id="nav-pantry"
                class="flex flex-col items-center justify-center w-[65px] h-full text-gray-400 hover:text-gray-600 transition-colors">
                <svg class="w-5 h-5 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                </svg>
                <span class="text-[9px] font-bold leading-none">Dispensa</span>
            </button>

        </div>
    </nav>

    <script type="module" src="./js/app.js?v=20"></script>
</body>

</html>
