<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gym Tracker PWA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <link rel="manifest" href="/manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tracker">
    <link rel="apple-touch-icon" href="/icon.png">
    <link rel="stylesheet" href="./css/style.css?v=5">
</head>

<body class="bg-gray-100 text-gray-900 font-sans antialiased selection:bg-blue-200">
    <div id="app" class="max-w-md mx-auto bg-gray-50 min-h-screen shadow-2xl relative overflow-x-hidden pb-20">
    </div>

    <nav
        class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 max-w-md mx-auto safe-pb z-50 flex justify-around p-3">
        <button id="nav-gym" class="flex flex-col items-center text-gray-900">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3">
                </path>
            </svg>
            <span class="text-xs font-bold mt-1">Palestra</span>
        </button>
        <button id="nav-nutri" class="flex flex-col items-center text-gray-400 hover:text-gray-900 transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"></path>
            </svg>
            <span class="text-xs font-bold mt-1">Nutrizione</span>
        </button>
    </nav>

    <script type="module" src="./js/app.js?v=9"></script>
</body>

</html>
